spring.profiles.active = ${sbProfile}
camel.main.name=streaming-camel-server
camel.springboot.sourceLocationEnabled=true
#serverUrl=http://localhost:8080/test

#server.port=8080
#camel.http.port=8080


# Necessary for streaming
#camel.springboot.stream-caching-enabled=false
#camel.main.stream-caching-enabled=false
camel.springboot.spoolEnabled=true
camel.main.stream-caching-spool-enabled=true
camel.main.stream-caching-spool-threshold=65536

camel.component.platform-http.port=8080
camel.component.platform-http.host=0.0.0.0

#server.embedded.tomcat.enabled=false
#camel.component.platform-http.enabled=true
#camel.springboot.main-run-controller=false